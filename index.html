<script>(()=>{
const rings=[];
for(let i=0;i<6;i++){
const ring=document.getElementById('bgr'+i);
if(ring)rings.push({ring,orb:ring.querySelector('.bg-orb')});
}
function tick(){
const cx=window.innerWidth/2,cy=window.innerHeight/2;
rings.forEach(({ring,orb})=>{
if(!orb)return;
const r=orb.getBoundingClientRect();
if(!r.width)return;
const ox=r.left+r.width/2,oy=r.top+r.height/2;
const dx=cx-ox,dy=cy-oy;
const len=Math.sqrt(dx*dx+dy*dy)||1;
const hx=((dx/len)*0.35+0.5)*100;
const hy=((dy/len)*0.35+0.5)*100;
orb.style.setProperty('--hx',hx.toFixed(1)+'%');
orb.style.setProperty('--hy',hy.toFixed(1)+'%');
});
requestAnimationFrame(tick);
}
tick();
})();
(()=>{
const radii=[38,55,28,66,45,32]; 
const sizes=[9,6,11,5,8,7];
const tiers=[10,15,20,25,30,35,40].sort(()=>Math.random()-.5);
const vmin=Math.min(window.innerWidth,window.innerHeight)/100;
for(let i=0;i<6;i++){
const ring=document.getElementById('bgr'+i);
if(!ring)continue;
const dur=tiers[i];
const delay=(-Math.random()*dur).toFixed(1);
ring.style.animation=`bgOrbit ${dur}s linear ${delay}s infinite`;
const orb=ring.querySelector('.bg-orb');

const ALL_CATS=['食','衣','住','行','育','樂','借','薪','利','售','贈','獎','還','另'];
function importCSV(){
const input=document.createElement('input');
input.type='file';input.accept='.csv,text/csv';
input.style.display='none';
document.body.appendChild(input);
input.onchange=()=>{
const file=input.files[0];
if(!file)return;
document.body.removeChild(input);
const reader=new FileReader();
reader.onload=e=>{
try{
let text=e.target.result;
if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
const lines=text.split(/\r?\n/).filter(l=>l.trim());
if(!lines.length){alert('檔案是空的');return;}
const header=lines[0].replace(/"/g,'').trim();
const expectedHeader='日期,分類,帳戶,金額(TWD),原始幣別,原始金額,備註';
const isOwnFormat=(header===expectedHeader);
const rows=[];
const unknownCats=new Set();
for(let i=1;i<lines.length;i++){
const cols=lines[i].match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g)||[];
const clean=cols.map(v=>v.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
if(isOwnFormat){
const [date,cat,acc,amtStr,cur,amtOrigStr,note]=clean;
if(!date||isNaN(parseFloat(amtStr)))continue;
if(cat&&!ALL_CATS.includes(cat))unknownCats.add(cat);
rows.push({date,cat,acc,amt:parseFloat(amtStr),amtOrig:parseFloat(amtOrigStr)||parseFloat(amtStr),cur:cur||'TWD',note:note||''});
} else {
if(!lines[0])continue;
const headers=lines[0].replace(/"/g,'').split(',').map(h=>h.trim());
const di=headers.findIndex(h=>/日期|date/i.test(h));
const ai=headers.findIndex(h=>/金額|amount|price/i.test(h));
const ci=headers.findIndex(h=>/類別|分類|category|type/i.test(h));
const ni=headers.findIndex(h=>/備註|note|memo|desc/i.test(h));
if(di===-1||ai===-1){
alert('無法自動識別欄位\n請使用帳合匯出的 CSV 格式：\n'+expectedHeader);
return;
}
const date=clean[di]||'';
const amt=parseFloat((clean[ai]||'0').replace(/[^0-9.\-]/g,''));
const cat=clean[ci]||'另';
const note=ni>=0?clean[ni]||'':'';
if(!date||isNaN(amt))continue;
if(cat&&!ALL_CATS.includes(cat))unknownCats.add(cat);
rows.push({date,cat,acc:'可用金額',amt,amtOrig:amt,cur:'TWD',note});
}
}
if(unknownCats.size>0){
showCatMap(unknownCats,rows);
} else {
applyImport(rows);
}
}catch(e){alert('匯入失敗：'+e.message);}
};
reader.readAsText(file,'UTF-8');
};
input.click();
}

const oc=document.getElementById('oc'),ox=oc.getContext('2d',{willReadFrequently:true});
const MO=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
let today=new Date(),oAng=0,odrag=false;
(async()=>{
try{const r=await fetch('https://worldtimeapi.org/api/ip',{signal:AbortSignal.timeout(3500)});if(r.ok){const j=await r.json();today=new Date(j.datetime);}}catch(e){}
oAng=d2a(today);drawOrbit();

function doy(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);}
function d2a(d){return(doy(d)/365)*Math.PI*2-Math.PI/2;}
function a2d(a){
const n=((a+Math.PI/2)/(Math.PI*2)*365+365)%365;
return new Date(orbitYear,0,Math.round(n)||1);
}
let orbitYear=today.getFullYear();
let prevDoy=doy(today); 
function trackRotation(newAng){
const n=((newAng+Math.PI/2)/(Math.PI*2)*365+365)%365;
const curDoy=Math.round(n)||1;
if(prevDoy>330&&curDoy<35) orbitYear++;
if(prevDoy<35&&curDoy>330) orbitYear--;
prevDoy=curDoy;
}
function updDate(){
const d=a2d(oAng);
document.getElementById('p4mo').textContent=MO[d.getMonth()];
document.getElementById('p4yr').textContent="'"+String(d.getFullYear()).slice(2);
document.getElementById('p4dy').textContent=String(d.getDate()).padStart(2,'0');
}

function drawOrbit(){
if(!oc.width||!oc.height)return;
const w=oc.width,h=oc.height,cx=w/2,cy=h/2,R=w*.38;
const lit=odrag?1.0:.7; 
ox.clearRect(0,0,w,h);
ox.beginPath();ox.arc(cx,cy,R,0,Math.PI*2);
ox.strokeStyle=`rgba(240,237,232,${odrag?.62:.42})`;ox.lineWidth=1.3;ox.stroke();
const bx=cx+R*Math.cos(oAng),by=cy+R*Math.sin(oAng);
const bR=w*.064,bIn=w*.023;
const g=ox.createRadialGradient(bx,by,0,bx,by,bR*1.8);
g.addColorStop(0,`rgba(240,237,232,${.22*lit})`);g.addColorStop(1,'rgba(240,237,232,0)');
ox.beginPath();ox.arc(bx,by,bR*1.8,0,Math.PI*2);ox.fillStyle=g;ox.fill();
ox.beginPath();ox.arc(bx,by,bR,0,Math.PI*2);
ox.strokeStyle=`rgba(240,237,232,${.88*lit})`;ox.lineWidth=2;ox.stroke();
if(odrag){
const hl=ox.createRadialGradient(bx-bR*.3,by-bR*.3,0,bx,by,bR);
hl.addColorStop(0,'rgba(255,255,255,.55)');hl.addColorStop(1,'rgba(255,255,255,0)');
ox.beginPath();ox.arc(bx,by,bR,0,Math.PI*2);ox.fillStyle=hl;ox.fill();
}
ox.beginPath();ox.arc(bx,by,bIn,0,Math.PI*2);
ox.fillStyle=`rgba(240,237,232,${.72*lit})`;ox.fill();
ox.beginPath();ox.arc(cx,cy,w*.022,0,Math.PI*2);
ox.fillStyle='rgba(240,237,232,.20)';ox.fill();
updDate();
}
function oXY(e){
const r=oc.getBoundingClientRect();
return Math.atan2((e.touches?e.touches[0].clientY:e.clientY)-r.top-oc.height/2,(e.touches?e.touches[0].clientX:e.clientX)-r.left-oc.width/2);
}
oc.addEventListener('mousedown',e=>{odrag=true;oAng=oXY(e);drawOrbit();});
oc.addEventListener('touchstart',e=>{odrag=true;oAng=oXY(e);drawOrbit();e.stopPropagation();},{passive:true});
window.addEventListener('mousemove',e=>{if(odrag){const a=oXY(e);trackRotation(a);oAng=a;drawOrbit();}});
window.addEventListener('touchmove',e=>{if(odrag){const a=oXY(e);trackRotation(a);oAng=a;drawOrbit();}},{passive:true});
window.addEventListener('mouseup',()=>odrag=false);
window.addEventListener('touchend',()=>odrag=false);

let calcOpen=false,cNum='',cOp='',cPrev='',cSgn=1;
let pendingAmt=null,pendingAmtOrig=null,pendingCur='TWD';
function openCalc(){calcOpen=true;document.getElementById('calc').classList.add('open');}
function closeCalc(){calcOpen=false;document.getElementById('calc').classList.remove('open');}
function setSgn(s){cSgn=s;document.getElementById('spos').classList.toggle('on',s===1);document.getElementById('sneg').classList.toggle('on',s===-1);}
function updCex(){const om={'+':'+','-':'−','*':'×','/':'÷'};const opd=cOp?' '+(om[cOp]||cOp)+' ':'';document.getElementById('cex').textContent=(cSgn<0?'−':'')+(cPrev||'')+(cPrev&&cOp?opd:'')+(cNum||(!cPrev?'0':''));}
function ci(k){
if(k==='C'){cNum='';cOp='';cPrev='';}
else if(k==='pm'){cSgn=-cSgn;setSgn(cSgn);}
else if(k==='pct'){cNum=String(parseFloat(cNum||'0')/100);}
else if(['+','-','*','/'].includes(k)){if(cOp&&cNum){try{
const _a=parseFloat(cPrev),_b=parseFloat(cNum);
if(cOp==='+')cPrev=String(_a+_b);
else if(cOp==='-')cPrev=String(_a-_b);
else if(cOp==='*')cPrev=String(_a*_b);
else if(cOp==='/')cPrev=String(_b!==0?_a/_b:_a);
}catch(e){}}else if(cNum){cPrev=cNum;}cOp=k;cNum='';}
else if(k==='.'){if(!cNum.includes('.'))cNum=(cNum||'0')+'.';}
else{cNum=cNum===''||cNum==='0'?k:cNum+k;}
updCex();
}
function cc(){
let res=parseFloat(cNum||'0');
if(cOp&&cPrev){try{
const a=parseFloat(cPrev),b=parseFloat(cNum||'0');
if(cOp==='+')res=a+b;
else if(cOp==='-')res=a-b;
else if(cOp==='*')res=a*b;
else if(cOp==='/')res=b!==0?a/b:a;
else res=b;
}catch(e){}}
const amtOrig=Math.abs(res)*cSgn;
const amtTWD=(curCur==='TWD'||!rates[curCur])?amtOrig:Math.round(amtOrig/rates[curCur]*100)/100;
pendingAmt=amtTWD; pendingAmtOrig=amtOrig; pendingCur=curCur;
rawInputAmt=amtOrig;
document.getElementById('pval').textContent=(amtOrig<0?'−':'')+Math.abs(amtOrig).toLocaleString('zh-TW');
cNum='';cOp='';cPrev='';cSgn=1;setSgn(1);updCex();closeCalc();updConv();
}
